# .github/workflows/test-testpypi-poll.yml — TEMPORARY, DO NOT merge to main
# Validates the "Wait for Test PyPI availability" poll script added to the
# release-*.yml workflows (issue #236). Runs the exact snippet twice:
#   - positive: a version that exists on Test PyPI  -> poll succeeds
#   - negative: a version that does not exist       -> poll fails (asserted)
name: Test Test-PyPI poll (temporary)

on:
  push:
    branches: [fix/ci-testpypi-poll-and-eks-init]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll-existing:
    name: "Poll: version exists (expect pass)"
    runs-on: ubuntu-latest
    env:
      PKG_NAME: jupyter-deploy
      VERSION: "0.6.1"
    steps:
      - name: Wait for Test PyPI availability
        run: |
          url="https://test.pypi.org/pypi/${PKG_NAME}/${VERSION}/json"
          echo "Polling ${url}"
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null "${url}"; then
              echo "${PKG_NAME}==${VERSION} is available on Test PyPI"
              exit 0
            fi
            echo "Attempt ${i}/20: not yet available, retrying in 15s..."
            sleep 15
          done
          echo "::error::${PKG_NAME}==${VERSION} did not appear on Test PyPI within 5 minutes"
          exit 1

  poll-missing:
    name: "Poll: version missing (expect fail, asserted)"
    runs-on: ubuntu-latest
    env:
      PKG_NAME: jupyter-deploy
      VERSION: "99.99.99"
      # Shorten the loop for the negative case so the run doesn't burn the full
      # 5-minute timeout; behaviour (curl -f -> retry -> non-zero exit) is identical.
      ATTEMPTS: "3"
    steps:
      - name: Assert poll fails for a missing version
        run: |
          set +e
          url="https://test.pypi.org/pypi/${PKG_NAME}/${VERSION}/json"
          echo "Polling ${url} (expecting failure)"
          (
            for i in $(seq 1 "${ATTEMPTS}"); do
              if curl -fsS -o /dev/null "${url}"; then
                echo "${PKG_NAME}==${VERSION} is available on Test PyPI"
                exit 0
              fi
              echo "Attempt ${i}/${ATTEMPTS}: not yet available, retrying in 15s..."
              sleep 15
            done
            echo "::error::${PKG_NAME}==${VERSION} did not appear on Test PyPI within 5 minutes"
            exit 1
          )
          rc=$?
          if [ "${rc}" -eq 0 ]; then
            echo "::error::Poll unexpectedly SUCCEEDED for a non-existent version"
            exit 1
          fi
          echo "Poll correctly failed (exit ${rc}) for non-existent version — test passed"
