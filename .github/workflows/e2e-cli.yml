name: E2E release gate (CLI)

on:
  workflow_call:
    inputs:
      pkg-version:
        description: "Package version (from build job)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

# CLI release E2E always targets OAuth app #2 (release-base deployment)
concurrency:
  group: e2e-2
  cancel-in-progress: false

jobs:
  # --- Build images (parallel: bare + aws) ---

  build-image-bare:
    name: "Build image (bare)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull previous image for cache
        run: just ci-e2e-cli-pull bare || true

      - name: Build CLI E2E image (bare)
        run: |
          ECR_URL=$(just ci-e2e-base-ecr-url 2)
          BUILD_ARGS="--build-arg INSTALL_MODE=pypi"
          BUILD_ARGS="$BUILD_ARGS --build-arg INSTALL_VARIANT=bare"
          BUILD_ARGS="$BUILD_ARGS --build-arg PKG_VERSION=${{ inputs.pkg-version }}"
          just ci-e2e-cli-build "$ECR_URL:jd-bare" "$BUILD_ARGS"

      - name: Push to ECR
        run: just ci-e2e-cli-push bare

  build-image-aws:
    name: "Build image (aws)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull previous image for cache
        run: just ci-e2e-cli-pull aws || true

      - name: Build CLI E2E image (aws)
        run: |
          ECR_URL=$(just ci-e2e-base-ecr-url 2)
          BUILD_ARGS="--build-arg INSTALL_MODE=pypi"
          BUILD_ARGS="$BUILD_ARGS --build-arg INSTALL_VARIANT=aws"
          BUILD_ARGS="$BUILD_ARGS --build-arg PKG_VERSION=${{ inputs.pkg-version }}"
          just ci-e2e-cli-build "$ECR_URL:jd-aws" "$BUILD_ARGS"

      - name: Push to ECR
        run: just ci-e2e-cli-push aws

  build-image-aws-k8s:
    name: "Build image (aws-k8s)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull previous image for cache
        run: just ci-e2e-cli-pull aws-k8s || true

      - name: Build CLI E2E image (aws-k8s)
        run: |
          ECR_URL=$(just ci-e2e-base-ecr-url 2)
          BUILD_ARGS="--build-arg INSTALL_MODE=pypi"
          BUILD_ARGS="$BUILD_ARGS --build-arg INSTALL_VARIANT=aws-k8s"
          BUILD_ARGS="$BUILD_ARGS --build-arg PKG_VERSION=${{ inputs.pkg-version }}"
          just ci-e2e-cli-build "$ECR_URL:jd-aws-k8s" "$BUILD_ARGS"

      - name: Push to ECR
        run: just ci-e2e-cli-push aws-k8s

  # --- Smoke tests (parallel: bare + aws + aws-k8s) ---

  smoke-bare:
    name: "Smoke tests (bare)"
    needs: [build-image-bare]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull bare image
        run: just ci-e2e-cli-pull bare

      - name: Run bare smoke tests
        run: just test-smoke-cli bare jupyter-deploy-e2e-cli:latest

  smoke-aws:
    name: "Smoke tests (aws)"
    needs: [build-image-aws]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull aws image
        run: just ci-e2e-cli-pull aws

      - name: Run aws smoke tests
        run: just test-smoke-cli aws jupyter-deploy-e2e-cli:latest

  smoke-aws-k8s:
    name: "Smoke tests (aws-k8s)"
    needs: [build-image-aws-k8s]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Pull aws-k8s image
        run: just ci-e2e-cli-pull aws-k8s

      - name: Run aws-k8s smoke tests
        run: just test-smoke-cli aws-k8s jupyter-deploy-e2e-cli:latest

  # --- Gate: smoke tests must pass before functional tests ---

  smoke-gate:
    name: "Smoke gate"
    needs: [smoke-bare, smoke-aws, smoke-aws-k8s]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: All smoke tests passed
        run: echo "Smoke tests passed for bare, aws and aws-k8s tracks"

  # --- Functional tests (aws image against app #2 deployment) ---

  aws-functional-test:
    name: "AWS functional test (cli marker)"
    needs: [smoke-gate, build-image-aws]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Restore base project (app 2)
        run: just ci-restore-base 2 sandbox-ci sandbox-e2e

      # yamllint disable-line rule:line-length
      - name: Generate .env
        run: >-
          just env-setup-base sandbox-e2e sandbox-ci 2
          "safe-user=ellisonbg,org=jupyter-infra,safe-org=jupyter-server,team=jupyter-deploy-e2e-app-access,safe-team=jupyter-deploy-e2e-app-no-access,larger-instance=t3.xlarge,larger-log-retention-days=270,cpu-instance=t3.medium,gpu-instance=g6.xlarge"

      - name: Pull aws image
        run: just ci-e2e-cli-pull aws

      - name: Run CLI functional tests
        run: just test-e2e-cli sandbox-e2e

  # --- EKS functional tests (aws-k8s image against app #5 deployment) ---
  # Runs in parallel with aws-functional-test — independent deployment.

  eks-functional-test:
    name: "EKS functional test (cli marker)"
    needs: [smoke-gate, build-image-aws-k8s]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: e2e
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV and Python
        uses: ./.github/actions/install-uv
        with:
          python-version: "3.13"

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::997498698382:role/jupyter-infra-ci-e2e-6a3e2625
          aws-region: us-west-2

      - name: Restore CI project
        run: just ci-restore sandbox-ci

      - name: Restore EKS project (app 5)
        run: just ci-restore-eks 5 sandbox-ci sandbox-e2e

      # yamllint disable-line rule:line-length
      - name: Generate .env
        run: >-
          just env-setup-eks sandbox-e2e sandbox-ci 5
          "org=jupyter-infra,team=jupyter-deploy-e2e-app-access,rbac-team=jupyter-deploy-e2e-app-access,admin-roles=[\"Admin\",\"DeployRole\",\"jupyter-infra-ci-e2e-6a3e2625\"]"

      - name: Pull aws-k8s image
        run: just ci-e2e-cli-pull aws-k8s

      - name: Run EKS CLI functional tests
        run: just test-e2e-cli-eks sandbox-e2e

  # No cleanup job needed — all cli-marked tests are read-only (terraform state
  # queries, local history reads, config in temp dirs). None start the host.
