apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`{{ .Values.domain }}`) && PathPrefix(`{{ .Values.path }}`)"
      kind: Rule
      middlewares:
        - name: auth-headers
          namespace: {{ .Values.namespace }}
        - name: oauth-auth-redirect
          namespace: {{ .Values.namespace }}
      services:
        - name: {{ .Values.name }}
          namespace: {{ .Values.namespace }}
          port: {{ .Values.port }}
