apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: jupyter-deploy
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: jupyter-deploy
  ports:
    - port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
