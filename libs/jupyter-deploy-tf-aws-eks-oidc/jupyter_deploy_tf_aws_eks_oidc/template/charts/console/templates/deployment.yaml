apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/managed-by: jupyter-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.name }}
      app.kubernetes.io/managed-by: jupyter-deploy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/managed-by: jupyter-deploy
    spec:
      nodeSelector:
        jupyter-deploy/role: components
      containers:
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: {{ .Values.port }}
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      volumes:
        - name: content
          configMap:
            name: {{ .Values.name }}
            items:
              - key: index.html
                path: index.html
              - key: set-kubeconfig.sh
                path: set-kubeconfig.sh
        - name: nginx-conf
          configMap:
            name: {{ .Values.name }}
            items:
              - key: nginx.conf
                path: default.conf
